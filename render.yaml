services:
  - type: web
    name: visionflow-clinical-copilot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd web && npm install && npm run build
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false
